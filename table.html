<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الدرجات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <header class="cyber-header mini">
        <h1>جدول درجات الطلاب</h1>
    </header>

    <main class="main-container">
        <section class="glass-card">
            <table class="cyber-table">
                <thead>
                    <tr>
                        <th>اسم الطالب</th>
                        <th>المادة</th>
                        <th>الدرجة</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- تم تعديل الأسماء لتطابق فريق العمل -->
                    <tr><td>عابد معيش السلمي</td><td>علوم الحاسب</td><td><span class="grade">100</span></td></tr>
                    <tr><td>عبدالله ضيف الله السلمي</td><td>الفيزياء</td><td><span class="grade">98</span></td></tr>
                    <tr><td>انس عبدالاله العمري</td><td>الكيمياء</td><td><span class="grade">95</span></td></tr>
                    <tr><td>تامر رافت جان</td><td>اللغة العربية</td><td><span class="grade">99</span></td></tr>
                    <tr><td>مؤيد هشام الزايدي</td><td>اللغة الإنجليزية</td><td><span class="grade">96</span></td></tr>
                </tbody>
            </table>
        </section>

        <div class="btn-center">
            <a href="index.html" class="neon-btn outline">🏠 العودة للرئيسية</a>
        </div>
    </main>

</body>
</html>
